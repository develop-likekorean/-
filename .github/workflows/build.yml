name: 빼꼼 인덱스 빌드

# 실행 시점:
#  - Actions 탭에서 "Run workflow" 수동 실행
#  - main/master 브랜치 푸시 → 빌드 후 설치파일을 Artifacts로
#  - v1.0.1 같은 태그 푸시 → 빌드 + GitHub Releases에 게시(자동 업데이트용)
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ---------- 윈도우 (.exe + 자동 업데이트 게시) ----------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 필요한 파일 설치
        run: npm install
      - name: 빌드 (태그면 Releases에 게시)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            npx electron-builder --win --publish always
          } else {
            npm run build:win
          }
      - name: 완성파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  # ---------- 맥 (.dmg) ----------
  build-mac:
    needs: build-windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 필요한 파일 설치
        run: npm install
      - name: 빌드 (태그면 Releases에 게시)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            npx electron-builder --mac --publish always
          else
            npm run build:mac
          fi
      - name: 완성파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
