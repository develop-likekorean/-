<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>빼꼼 인덱스</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="collapsed side-right size-medium">
    <!-- 펼쳐지는 패널 -->
    <section id="panel">
      <div id="resize-handle" title="크기 조절"></div>
      <div id="panel-inner">

        <!-- 메모/링크 화면 -->
        <div id="note-view">
          <header class="panel-header">
            <input id="note-title" type="text" placeholder="제목 (선택)" maxlength="20" />
            <button id="btn-more" class="icon-btn" title="색상·링크">⋯</button>
            <button id="btn-pin" class="icon-btn" title="고정">📌</button>
            <button id="btn-collapse" class="icon-btn" title="접기">›</button>
          </header>

          <div id="color-row"></div>

          <div id="link-row">
            <span class="link-ico">🔗</span>
            <input id="note-url" type="text" placeholder="링크 붙여넣기 (선택) — 넣으면 웹페이지가 떠요" />
            <button id="btn-clear-url" class="mini-btn hidden" title="링크 지우기">✕</button>
          </div>

          <div id="note-body" contenteditable="true" data-placeholder="여기에 메모를 적어보세요..."></div>
          <webview id="note-web" class="hidden" partition="persist:bbaekkom" allowpopups></webview>

          <footer class="panel-footer">
            <button id="btn-delete" class="ghost danger">이 메모 삭제</button>
            <span id="save-status">저장됨</span>
          </footer>
        </div>

        <!-- 설정 화면 -->
        <div id="settings-view" class="hidden">
          <header class="panel-header">
            <h2>설정</h2>
            <button id="btn-settings-close" class="icon-btn" title="닫기">›</button>
          </header>

          <div class="setting-block">
            <p class="setting-title">인덱스 크기</p>
            <label class="mode-option">
              <input type="radio" name="size" value="large" />
              <span><b>크게</b><small>탭이 크고 글씨도 큼.</small></span>
            </label>
            <label class="mode-option">
              <input type="radio" name="size" value="medium" />
              <span><b>보통</b><small>기본값. 적당한 크기.</small></span>
            </label>
            <label class="mode-option">
              <input type="radio" name="size" value="small" />
              <span><b>작게</b><small>얇고 화면을 덜 차지해요.</small></span>
            </label>
            <label class="mode-option">
              <input type="radio" name="size" value="mini" />
              <span><b>최소화</b><small>제목 없이 색 띠만 빼꼼.</small></span>
            </label>
          </div>

          <div class="setting-block">
            <p class="setting-title">인덱스 위치</p>
            <label class="mode-option">
              <input type="radio" name="side" value="right" />
              <span><b>오른쪽</b><small>화면 오른쪽 가장자리에서 빼꼼.</small></span>
            </label>
            <label class="mode-option">
              <input type="radio" name="side" value="left" />
              <span><b>왼쪽</b><small>화면 왼쪽 가장자리에서 빼꼼.</small></span>
            </label>
          </div>

          <div class="setting-block">
            <p class="setting-title">투명도</p>
            <div class="slider-row">
              <input type="range" id="opacity-range" min="30" max="100" step="5" value="100" />
              <span id="opacity-val">100%</span>
            </div>
          </div>

          <div class="setting-block">
            <p class="setting-title">동작 모드</p>
            <label class="mode-option">
              <input type="radio" name="mode" value="auto" />
              <span><b>자동 최소화</b><small>인덱스 바깥을 클릭하면 자동으로 접혀요. 📌 핀을 누르면 고정됩니다.</small></span>
            </label>
            <label class="mode-option">
              <input type="radio" name="mode" value="always" />
              <span><b>항상 열림</b><small>직접 접기 전까지 계속 펼쳐져 있어요.</small></span>
            </label>
          </div>

          <div class="setting-block">
            <label class="toggle-row">
              <input type="checkbox" id="chk-autolaunch" />
              <span>컴퓨터 켤 때 자동으로 실행</span>
            </label>
          </div>

          <div class="setting-block">
            <p class="setting-title">업데이트</p>
            <button id="btn-check-update" class="upd-btn">업데이트 확인</button>
            <span id="update-status" class="update-status"></span>
            <button id="btn-install-update" class="upd-btn hidden">지금 재시작해서 업데이트</button>
          </div>

          <div class="setting-block">
            <button id="btn-quit" class="ghost danger">빼꼼 인덱스 종료</button>
          </div>

          <p id="version-line" class="version-line"></p>
        </div>

        <div id="resize-handle-v" title="높이 조절"></div>
      </div>
    </section>

    <!-- 항상 보이는 탭 기둥 -->
    <nav id="tabs"></nav>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
